<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ColmadoBot Panel</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: sans-serif; background: #f0f2f5; }
header { background: linear-gradient(135deg,#25D366,#128C7E); color: white; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
header h1 { font-size: 1.3rem; }
.stats { display: flex; gap: 12px; padding: 16px 24px; }
.stat { background: white; border-radius: 10px; padding: 14px 20px; flex: 1; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
.stat .n { font-size: 2rem; font-weight: 700; }
.stat.nv .n { color: #e67e22; }
.stat.pr .n { color: #2980b9; }
.stat.ls .n { color: #27ae60; }
.cols { display: flex; gap: 16px; padding: 0 24px 24px; }
.col { flex: 1; min-width: 260px; }
.col-h { padding: 10px 16px; border-radius: 8px 8px 0 0; color: white; font-weight: 700; display: flex; gap: 8px; align-items: center; }
.col-nv .col-h { background: #e67e22; }
.col-pr .col-h { background: #2980b9; }
.col-ls .col-h { background: #27ae60; }
.col-b { background: white; border-radius: 0 0 8px 8px; padding: 10px; min-height: 180px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
.card { background: #fafafa; border: 1px solid #e0e0e0; border-radius: 8px; padding: 10px; margin-bottom: 8px; }
.card-h { display: flex; justify-content: space-between; margin-bottom: 4px; }
.cn { font-weight: 700; font-size: .9rem; }
.ch { font-size: .75rem; color: #999; }
.msg { font-size: .82rem; color: #555; border-left: 3px solid #ddd; padding-left: 6px; font-style: italic; margin-bottom: 6px; }
.tag { display: inline-block; background: #e8f5e9; color: #2e7d32; font-size: .72rem; padding: 2px 7px; border-radius: 10px; margin: 2px; }
.acts { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 6px; }
.btn { padding: 4px 10px; border: none; border-radius: 5px; cursor: pointer; font-size: .75rem; font-weight: 700; }
.bp { background: #2980b9; color: white; }
.bl { background: #27ae60; color: white; }
.bn { background: #e67e22; color: white; }
.vacio { text-align: center; color: #ccc; padding: 24px 0; }
.bdg { background: rgba(255,255,255,.3); border-radius: 10px; padding: 0 7px; font-size: .8rem; }
#st { position: fixed; bottom: 14px; right: 14px; padding: 6px 14px; border-radius: 16px; font-size: .75rem; font-weight: 700; }
.on { background: #27ae60; color: white; }
.off { background: #e74c3c; color: white; }
</style>
</head>
<body>
<header><h1>ColmadoBot Panel de Pedidos</h1><span id="ua">Cargando...</span></header>
<div class="stats">
  <div class="stat nv"><div class="n" id="c0">0</div><div>Nuevos</div></div>
  <div class="stat pr"><div class="n" id="c1">0</div><div>Preparando</div></div>
  <div class="stat ls"><div class="n" id="c2">0</div><div>Listos</div></div>
</div>
<div class="cols">
  <div class="col col-nv"><div class="col-h">Nuevos <span class="bdg" id="b0">0</span></div><div class="col-b" id="q0"></div></div>
  <div class="col col-pr"><div class="col-h">Preparando <span class="bdg" id="b1">0</span></div><div class="col-b" id="q1"></div></div>
  <div class="col col-ls"><div class="col-h">Listos <span class="bdg" id="b2">0</span></div><div class="col-b" id="q2"></div></div>
</div>
<div id="st" class="off">Conectando...</div>
<script>
function fmt(p) {
  var h = p.hora ? new Date(p.hora).toLocaleTimeString("es-DO",{hour:"2-digit",minute:"2-digit"}) : "";
  var prods = (p.productos||[]).map(function(x){return '<span class="tag">'+x+'</span>';}).join("");
  var btns = "";
  if(p.estado==="nuevo") btns='<button class="btn bp" onclick="upd(\''+(p.id)+'\',\'preparando\')">Preparando</button>';
  if(p.estado==="preparando") btns='<button class="btn bl" onclick="upd(\''+(p.id)+'\',\'listo\')">Listo</button><button class="btn bn" onclick="upd(\''+(p.id)+'\',\'nuevo\')">Nuevo</button>';
  if(p.estado==="listo") btns='<button class="btn bp" onclick="upd(\''+(p.id)+'\',\'preparando\')">Preparando</button>';
  return '<div class="card"><div class="card-h"><span class="cn">'+(p.nombreCliente||p.cliente)+'</span><span class="ch">'+h+'</span></div><div class="msg">'+(p.mensajeOriginal||"")+'</div>'+(prods?'<div>'+prods+'</div>':"")+'<div class="acts">'+btns+'</div></div>';
}
function load() {
  fetch("/api/pedidos").then(function(r){return r.json();}).then(function(data){
    var cols={nuevo:[],preparando:[],listo:[]};
    data.forEach(function(p){if(cols[p.estado])cols[p.estado].push(p);});
    var ids=["nuevo","preparando","listo"];
    ids.forEach(function(e,i){
      var lst=cols[e];
      document.getElementById("c"+i).textContent=lst.length;
      document.getElementById("b"+i).textContent=lst.length;
      var el=document.getElementById("q"+i);
      el.innerHTML=lst.length?lst.map(fmt).join(""):'<div class="vacio">Sin pedidos</div>';
    });
    document.getElementById("st").className="on";
    document.getElementById("st").textContent="En linea";
    document.getElementById("ua").textContent="Act: "+new Date().toLocaleTimeString("es-DO");
  }).catch(function(e){
    document.getElementById("st").className="off";
    document.getElementById("st").textContent="Sin conexion";
  });
}
function upd(id,estado){
  fetch("/api/pedidos/"+id,{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify({estado:estado})}).then(load).catch(function(){alert("Error");});
}
load();
setInterval(load,5000);
</script>
</body>
</html>
